name: Bug report
description: Report a reproducible problem without sharing private company data.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: Do not upload real chat screenshots, names, company information, QR codes, or login data.
  - type: input
    id: version
    attributes:
      label: Join Helper version
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Windows, WeCom, and display scaling versions
    validations:
      required: true
  - type: textarea
    id: behavior
    attributes:
      label: Reproduction and observed behavior
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I removed all personal and company data from this report.
          required: true
