name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Set up Python
        uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        run: python -m pip install --disable-pip-version-check -r requirements.txt -r requirements-dev.txt

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          if ($version -notmatch "^[0-9]+\.[0-9]+\.[0-9]+(?:-[0-9A-Za-z.-]+)?$") {
            throw "Invalid release tag: ${{ github.ref_name }}"
          }
          "value=$version" >> $env:GITHUB_OUTPUT

      - name: Build portable release
        shell: pwsh
        run: |
          ./scripts/build_release.ps1 `
            -Version "${{ steps.version.outputs.value }}" `
            -PythonExe "python" `
            -OutputRoot "${{ github.workspace }}\release" `
            -SkipBootstrap

      - name: Ensure Inno Setup is available
        id: inno
        shell: pwsh
        run: |
          $candidates = @(
            "C:\Program Files (x86)\Inno Setup 6\ISCC.exe",
            "C:\Program Files\Inno Setup 6\ISCC.exe"
          )
          $iscc = $candidates | Where-Object { Test-Path -LiteralPath $_ } | Select-Object -First 1
          if (-not $iscc) {
            choco install innosetup --no-progress -y
            $iscc = $candidates | Where-Object { Test-Path -LiteralPath $_ } | Select-Object -First 1
          }
          if (-not $iscc) { throw "ISCC.exe was not found" }
          "path=$iscc" >> $env:GITHUB_OUTPUT

      - name: Build installer
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.value }}"
          ./scripts/build_installer.ps1 `
            -Version $version `
            -BundleRoot "${{ github.workspace }}\release\.build-v$version\staging\JoinHelper" `
            -OutputRoot "${{ github.workspace }}\release" `
            -IsccPath "${{ steps.inno.outputs.path }}"

      - name: Verify installer install and uninstall
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.value }}"
          ./scripts/installer_smoke_test.ps1 `
            -SetupPath "${{ github.workspace }}\release\JoinHelper-Setup-v$version.exe" `
            -InstallRoot "${{ runner.temp }}\Join Helper Install Test" `
            -ResultPath "${{ runner.temp }}\installed-smoke-result.json"

      - name: Upload release artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: join-helper-${{ github.ref_name }}
          path: |
            release/JoinHelper-Portable-*.zip
            release/JoinHelper-Portable-*.zip.sha256
            release/JoinHelper-Setup-*.exe
            release/JoinHelper-Setup-*.exe.sha256
          if-no-files-found: error

      - name: Create draft GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" `
            --draft `
            --generate-notes `
            --title "Join Helper ${{ github.ref_name }}" `
            release/JoinHelper-Portable-*.zip `
            release/JoinHelper-Portable-*.zip.sha256 `
            release/JoinHelper-Setup-*.exe `
            release/JoinHelper-Setup-*.exe.sha256
